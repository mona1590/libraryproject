<!DOCTYPE html>
<html>
<head>
    <title>Task 7 - Students per City</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 20px;
        }
        table {
            border-collapse: collapse;
            width: 50%;
            margin-top: 20px;
        }
        th, td {
            border: 1px solid #ddd;
            padding: 12px;
            text-align: left;
        }
        th {
            background-color: #4CAF50;
            color: white;
        }
        tr:nth-child(even) {
            background-color: #f2f2f2;
        }
        h1 {
            color: #333;
        }
    </style>
</head>
<body>
    <h1>📊 Number of Students in Each City</h1>
    
    <table>
        <thead>
            <tr>
                <th>🏙️ City</th>
                <th>👨‍🎓 Number of Students</th>
            </tr>
        </thead>
        <tbody>
            {% for city in cities %}
            <tr>
                <td>{{ city.city }}</td>
                <td>{{ city.student_count }}</td>
            </tr>
            {% empty %}
            <tr>
                <td colspan="2">No students found in any city.</td>
            </tr>
            {% endfor %}
        </tbody>
    </table>
    
    <p><a href="/books/lab8/task6/">← Back to Students List</a></p>
</body>
</html>
